<!doctype html>
<html lang="en">
  {% assign asset_version = site.time | date: "%s" %}
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.summary | default: site.description | strip_html | normalize_whitespace }}">
    <link rel="icon" type="image/x-icon" href="{{ '/static/favicon.ico' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ asset_version }}">
  </head>
  <body data-search-index="{{ '/search.json' | relative_url }}">
    <header class="site-header">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/oi/' | relative_url }}">OI</a>
        <a href="{{ '/math/' | relative_url }}">Math</a>
        <a href="{{ '/machine-learning/' | relative_url }}">Machine Learning</a>
      </nav>
    </header>

    <main class="page-shell">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>Built with Jekyll and hosted on GitHub Pages.</p>
    </footer>

    <script src="{{ '/assets/js/search.js' | relative_url }}?v={{ asset_version }}" defer></script>
  </body>
</html>
